name: Test OCP CN-Quickstart Integration

on:
  push:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  test-ocp-quickstart:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Configure npm (retries for flaky registry)
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000

      - name: Upgrade npm
        run: npm install --global npm@11.10.0

      - name: Initialize Submodules
        run: |
          set -euo pipefail

          init_submodule() {
            local path="$1"
            shift
            if git submodule update --init "$@" "$path"; then
              return
            fi

            echo "Submodule init failed for $path, retrying with clean checkout..."
            git submodule deinit -f -- "$path" || true
            rm -rf "$path"
            rm -rf ".git/modules/$path"
            git submodule update --init "$@" "$path"
          }

          init_submodule libs/Open-Cap-Format-OCF --depth 1

      - name: Install Dependencies
        run: |
          set -euo pipefail
          attempt=1
          max=3
          while [ "$attempt" -le "$max" ]; do
            if npm install; then
              exit 0
            fi
            echo "npm install failed (attempt $attempt/$max), retrying..."
            if [ "$attempt" -eq "$max" ]; then
              exit 1
            fi
            sleep $((attempt * 15))
            attempt=$((attempt + 1))
          done

      - name: Build Package
        run: npm run build

      - name: Restore LocalNet asset cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/fairmint/canton-localnet
          key: canton-localnet-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            canton-localnet-${{ runner.os }}-

      - name: Start LocalNet
        run: |
          npm run localnet:start
          echo "✓ LocalNet started"
        timeout-minutes: 15

      - name: Run LocalNet Smoke + Integration Tests
        run: |
          echo "Running tests..."
          npm run localnet:smoke
          npm run localnet:test
          echo "✓ Tests passed!"

      - name: Show Logs on Failure
        if: failure()
        run: npm run localnet:logs || true
